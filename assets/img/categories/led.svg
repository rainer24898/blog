<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title>LED</title>
    <desc>Artwork for LED category</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3f3f46"/>
            <stop offset="55%" stop-color="#f43f5e"/>
            <stop offset="100%" stop-color="#fda4af"/>
        </linearGradient>
        <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(255,255,255,0)" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
        </linearGradient>
        <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
            <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
        </pattern>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.25"/>
        </filter>
    </defs>
    <rect width="1600" height="900" fill="url(#bg)"/>
    <rect width="1600" height="900" fill="url(#grid)"/>
    <g opacity="0.22">
        <circle cx="220" cy="180" r="150" fill="#ffffff"/>
        <circle cx="1440" cy="120" r="110" fill="#ffffff"/>
        <circle cx="1360" cy="760" r="180" fill="#ffffff"/>
    </g>
    <path d="M0,780 C260,620 420,680 720,720 C1040,765 1220,650 1600,540 L1600,900 L0,900 Z" fill="#000000" fill-opacity="0.18"/>
    <g filter="url(#shadow)">
        <g opacity="0.95" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 1062.0 375.0 a 90 90 0 1 1 180 0 v 25 h -180 z"/>
            <path d="M 1112.0 400.0 v 170"/>
            <path d="M 1187.0 400.0 v 170"/>
            <path d="M 1052.0 490.0 h 200" opacity="0.7"/>
            <path d="M 972.0 280.0 l -40 -40" opacity="0.8"/>
            <path d="M 1082.0 230.0 v -55" opacity="0.8"/>
            <path d="M 1272.0 245.0 l 45 -45" opacity="0.8"/>
        </g></g>
    <g opacity="0.16" fill="#ffffff">
      <rect x="120" y="130" width="260" height="18" rx="9"/>
      <rect x="120" y="170" width="180" height="18" rx="9"/>
      <rect x="120" y="210" width="220" height="18" rx="9"/>
    </g>
    </svg>